<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Casino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Questrial&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg-1: #0b0f14;
      --bg-2: #1a2531;
      --accent: #f1b24a;
      --accent-2: #e07a5f;
      --bubble: #f6efe6;
      --bubble-border: #e2caa2;
      --text: #2a241e;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Questrial', sans-serif;
      background: var(--bg-1);
    }

    #renderCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }

    #introOverlay,
    #gameOverOverlay {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 10;
      opacity: 1;
      visibility: visible;
      background: var(--bg-1);
      transition: opacity 250ms ease, visibility 0ms linear 250ms;
    }

    #victoryOverlay {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 12;
      opacity: 1;
      visibility: visible;
      background: var(--bg-1);
      transition: opacity 250ms ease, visibility 0ms linear 250ms;
    }

    #victoryOverlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .victory-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .victory-bubble {
      position: absolute;
      right: 6%;
      bottom: 10%;
      max-width: min(520px, 84vw);
      margin: 0;
      padding: 20px 22px;
      border-radius: 18px;
      background: var(--bubble);
      border: 2px solid var(--bubble-border);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      font-size: 20px;
      line-height: 1.35;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
      animation: introFade 600ms ease both;
    }

    .victory-bubble::before,
    .victory-bubble::after {
      content: '';
      position: absolute;
      top: 32%;
      width: 0;
      height: 0;
      border-top: 16px solid transparent;
      border-bottom: 16px solid transparent;
    }

    .victory-bubble::before {
      left: -22px;
      border-right: 20px solid var(--bubble-border);
    }

    .victory-bubble::after {
      left: -18px;
      border-right: 18px solid var(--bubble);
    }

    .victory-actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
    }

    #victoryCloseButton {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-family: 'Questrial', sans-serif;
      font-size: 16px;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #1b140c;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.25);
    }

    #introOverlay.hidden,
    #gameOverOverlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .intro-bubble {
      position: relative;
      max-width: min(520px, 84vw);
      margin: 0;
      animation: introFade 600ms ease both;
      position: absolute;
      right: 6%;
      bottom: 10%;
      padding: 20px 22px;
      border-radius: 18px;
      background: var(--bubble);
      border: 2px solid var(--bubble-border);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      font-size: 20px;
      line-height: 1.35;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
    }

    .intro-bubble::before,
    .intro-bubble::after {
      content: '';
      position: absolute;
      top: 32%;
      width: 0;
      height: 0;
      border-top: 16px solid transparent;
      border-bottom: 16px solid transparent;
    }

    .intro-bubble::before {
      left: -22px;
      border-right: 20px solid var(--bubble-border);
    }

    .intro-bubble::after {
      left: -18px;
      border-right: 18px solid var(--bubble);
    }

    .intro-actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
    }

    #introContinue,
    #gameOverContinue {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-family: 'Questrial', sans-serif;
      font-size: 16px;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #1b140c;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.25);
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    #introContinue:hover,
    #gameOverContinue:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 22px rgba(0, 0, 0, 0.28);
    }

    #introContinue:disabled,
    #gameOverContinue:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      box-shadow: none;
    }

    @keyframes introFade {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .intro-bubble {
        right: 50%;
        bottom: 6%;
        transform: translateX(50%);
        font-size: 18px;
      }

      .intro-bubble::before,
      .intro-bubble::after {
        display: none;
      }

      .intro-actions {
        justify-content: center;
      }

      .victory-box {
        max-width: min(520px, 84vw);
      }

      .victory-bubble {
        right: 50%;
        bottom: 6%;
        transform: translateX(50%);
        font-size: 18px;
        max-width: min(520px, 84vw);
      }

      .victory-bubble::before,
      .victory-bubble::after {
        display: none;
      }

      .victory-actions {
        justify-content: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .intro-bubble {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="introOverlay" role="dialog" aria-modal="true" aria-hidden="false">
    <img class="intro-bg" src="/casinoepipo.jpg" alt="Pipo, le gerant du casino" />
    <div class="intro-bubble">
      <p>
        Ciao amico ! Moi c'est Pipo, le g&eacute;rant de ce casino. Bienvenue, dans mon
        &eacute;tablissement ! J'esp&egrave;re que tu vas t'amuser.
      </p>
      <div class="intro-actions">
        <button id="introContinue" type="button">Chargement...</button>
      </div>
    </div>
  </div>
  <div id="gameOverOverlay" role="dialog" aria-modal="true" aria-hidden="true" class="hidden">
    <img class="intro-bg" src="/casinoepipodehors.jpg" alt="Pipo, dehors du casino" />
    <div class="intro-bubble">
      <p id="gameOverMessage">
        Tu n'as plus d'argent ! Sors de mon casino.
      </p>
      <div class="intro-actions">
        <button id="gameOverContinue" type="button">OK</button>
      </div>
    </div>
  </div>
  <div id="victoryOverlay" class="overlay hidden" aria-hidden="true">
    <img class="victory-bg" src="/pipoecheque.jpg" alt="Pipo, victoire" />
    <div class="victory-bubble">
      <p id="victoryMessage">
        Félicitation amico ! Tu as gagné 1 000 000 d'euro.
      </p>
      <div class="victory-actions">
        <button id="victoryCloseButton" type="button">Encaisser le chèque</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
